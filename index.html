<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Breakout</title>
  <style>
    /* Center the game and give the page a dark background */
    body {
      margin: 0;
      background: #0b1020;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>

  <!-- Load the Phaser 3 game framework from a CDN (no install needed).
       This classic script runs first, defining the global `Phaser` that our
       ES modules reference. -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <!-- Our game code, as native ES modules (no build step needed). -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
